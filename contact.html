</head>

<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">alwood</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">O mnie</a>

          <li class="nav-item">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true" href="school.html">Szkoła</a>

          <li class="nav-item">
            <a class="nav-link active" href="contact.html" aria-current="page">Kontakt</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <!----------------------------------------------------------------------------------------------->
  <!-- Main -->
  <section id="contact" class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">Kontakt</h2>
      <div class="row">
        <div class="col-lg-6">
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Imię</label>
              <input type="text" class="form-control" id="name" placeholder="Podaj swoje imię">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Adres email</label>
              <input type="email" class="form-control" id="email" placeholder="Podaj swój adres email">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Wiadomość</label>
              <textarea class="form-control" id="message" rows="5" placeholder="Napisz swoją wiadomość"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Wyślij</button>
          </form>
        </div>
        <div class="col-lg-6 mt-4 mt-lg-0">
          <div class="info">
            <h3>Informacje kontaktowe</h3>
            <p>Adres: BLANK</p>
            <p>Telefon: BLANK</p>
            <p>Email: kontakt@alwood.site</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!----------------------------------------------------------------------------------------------->
</body>
